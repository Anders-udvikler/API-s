syntax = "proto3";

option csharp_namespace = "GrpcBooks";

package books;

service BookService {
  rpc GetBookById(GetBookByIdRequest) returns (Book);
  rpc CreateBook(CreateBookRequest) returns (CreateBookResponse);
  rpc WatchBooks(WatchBooksRequest) returns (stream Book);
}

message GetBookByIdRequest{
  int32 bookId = 1;
}

message Book {
  int32 bookId = 1;
  string title = 2;
  int32 authorId = 3;
  int32 publisherId = 4;
  int32 publicationYear = 5;
}

message CreateBookRequest{
  string title = 1;
  int32 authorId = 2;
  int32 publisherId = 3;
  int32 publicationYear = 4;
}

message CreateBookResponse{
  int32 bookId = 1;
  Status status = 2;
}

message WatchBooksRequest{
  //Empty?
}

enum Status{
    OK = 0;
    CANCELLED = 1;
    UNKNOWN = 2;
    INVALID_ARGUMENT = 3;
    DEADLINE_EXCEEDED = 4;
    NOT_FOUND = 5;
    ALREADY_EXISTS = 6;
    PERMISSION_DENIED = 7;
    RESOURCE_EXHAUSTED = 8;
    FAILED_PRECONDITION = 9;
    ABORTED = 10;
    OUT_OF_RANGE = 11;
    UNIMPLEMENTED = 12;
    INTERNAL = 13;
    UNAVAILABLE = 14;
    DATA_LOSS = 15;
    UNAUTHENTICATED = 16;
}